services:
  - type: web
    name: puppychef-whatsapp-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VERIFY_TOKEN
        value: puppychef2024
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
